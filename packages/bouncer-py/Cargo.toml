[package]
name = "bouncer-py"
version = "0.1.0"
edition = "2024"
description = "PyO3 bindings for Bouncer."
license = "MIT"
publish = false

[workspace]

[lib]
name = "_bouncer_native"
crate-type = ["cdylib"]

[dependencies]
bouncer-core = { path = "../../bouncer-core" }
pyo3 = { version = "0.28.3", features = ["extension-module"] }
rusqlite = "0.39.0"

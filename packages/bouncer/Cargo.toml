[package]
name = "bouncer"
version = "0.1.0"
edition = "2021"
description = "Thin Rust binding for Bouncer, a SQLite lease and coordination library."
license = "MIT"

[dependencies]
bouncer-core = { path = "../../bouncer-core" }
rusqlite = "0.39.0"
thiserror = "2.0.17"

[dev-dependencies]
rusqlite = { version = "0.39.0", features = ["bundled", "load_extension"] }
tempfile = "3"

name: release-extension

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: libbouncer_ext.so
            asset_name: bouncer-extension-linux-x86_64.so
          - os: macos-14
            artifact_name: libbouncer_ext.dylib
            asset_name: bouncer-extension-macos-arm64.dylib
          - os: windows-2022
            artifact_name: bouncer_ext.dll
            asset_name: bouncer-extension-windows-x86_64.dll

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build extension
        run: cargo build -p bouncer-extension --release

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_name }}"
          ./scripts/write_sha256.sh \
            "dist/${{ matrix.asset_name }}" \
            "dist/${{ matrix.asset_name }}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
